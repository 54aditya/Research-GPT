version: '3.9'
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - uploads:/tmp/uploads
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MONGODB_URI: ${MONGODB_URI:-}
      JWT_SECRET: ${JWT_SECRET:-}
      REDIS_URL: ${REDIS_URL:-}
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      ARXIV_API_KEY: ${ARXIV_API_KEY:-}
    depends_on:
      - mongo
      - redis
      - qdrant

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    volumes:
      - uploads:/tmp/uploads
      - ../backend:/app
    env_file:
      - .env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MONGODB_URI: ${MONGODB_URI:-}
      JWT_SECRET: ${JWT_SECRET:-}
      REDIS_URL: ${REDIS_URL:-}
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      ARXIV_API_KEY: ${ARXIV_API_KEY:-}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
    command: rq worker -u ${REDIS_URL:-redis://redis:6379/0} --with-scheduler
    depends_on:
      - mongo
      - redis
      - qdrant

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: https://research-gpt-osg5.onrender.com

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

volumes:
  uploads:
